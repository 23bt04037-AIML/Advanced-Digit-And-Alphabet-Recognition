
# ════════════════════════════════════════════════════════════════
#  DigitAI – Docker Compose
#
#  CPU (default):
#    docker compose -f deployment/docker-compose.yml up
#
#  GPU (NVIDIA):
#    docker compose -f deployment/docker-compose.yml \
#      -f deployment/docker-compose.gpu.yml up
# ════════════════════════════════════════════════════════════════

services:

  # ── Main Application ─────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    image: digitai:latest
    container_name: digitai_app
    restart: unless-stopped
    ports:
      - "8000:8000"   # FastAPI
      - "8501:8501"   # Streamlit
    environment:
      DATABASE_URL:         sqlite:////app/data/digit_recognition.db
      APP_ENV:              production
      DEFAULT_MODEL:        cnn_medium
      TF_CPP_MIN_LOG_LEVEL: "2"
      SECRET_KEY:           ${SECRET_KEY:-change_me_in_production}
    volumes:
      - app_data:/app/data
      - ../models:/app/models:ro          # trained weights (read-only)
      - app_uploads:/app/frontend/static/uploads
      - app_heatmaps:/app/frontend/static/heatmaps
      - app_logs:/app/logs
      - app_reports:/app/reports
    networks:
      - digitai_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: digitai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - digitai_net

volumes:
  app_data:
  app_uploads:
  app_heatmaps:
  app_logs:
  app_reports:

networks:
  digitai_net:
    driver: bridge
