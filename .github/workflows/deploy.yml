# ════════════════════════════════════════════════════════════════
#  CD Workflow – Build → Push → Deploy
#  Triggers: push to main only (after CI passes)
#
#  Required GitHub Secrets:
#    DEPLOY_HOST   – IP or hostname of your EC2 / GCP / VPS
#    DEPLOY_USER   – SSH user (e.g. ubuntu / ec2-user)
#    DEPLOY_KEY    – Private SSH key (PEM, no passphrase)
#    SECRET_KEY    – App secret key for production
# ════════════════════════════════════════════════════════════════
name: CD – Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:           # allow manual trigger from GitHub UI

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/digitai

jobs:

  # ── 1. Build & Push Docker image ────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push (CPU)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            USE_GPU=0

  # ── 2. Deploy to AWS EC2 / GCP / VPS via SSH ────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production      # requires manual approval in GitHub UI

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG:  ${{ needs.build.outputs.image_tag }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          REGISTRY:   ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR:   ${{ github.actor }}
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          port:     22
          envs:     IMAGE_TAG,SECRET_KEY,REGISTRY,IMAGE_NAME,GH_TOKEN,GH_ACTOR
          script: |
            set -e
            cd /opt/digitai

            # Pull latest code
            git pull origin main

            # Log in to GHCR
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # Pull the new image
            docker pull "$REGISTRY/$IMAGE_NAME:$IMAGE_TAG"

            # Export env vars for compose
            export SECRET_KEY="$SECRET_KEY"

            # Rolling update: restart only the app container
            docker compose -f deployment/docker-compose.yml pull app
            docker compose -f deployment/docker-compose.yml up -d --no-deps --remove-orphans app

            # Clean up old images
            docker image prune -f

            echo "✅ Deployed $IMAGE_TAG at $(date)"

  # ── 3. Smoke test after deploy ───────────────────────────────
  smoke:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Health check FastAPI
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              http://${{ secrets.DEPLOY_HOST }}/health) && \
            [ "$STATUS" = "200" ] && echo "✅ FastAPI healthy" && exit 0
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed" && exit 1

      - name: Notify (optional – add Slack/Discord webhook here)
        if: always()
        run: |
          echo "Deploy status: ${{ job.status }}"
