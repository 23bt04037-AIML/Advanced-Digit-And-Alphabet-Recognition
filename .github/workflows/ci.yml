# ════════════════════════════════════════════════════════════════
#  CI Workflow – runs on every push / PR
#  Jobs: lint → test → security-scan
# ════════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:

  # ── 1. Lint ──────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install flake8 black isort

      - name: flake8
        run: flake8 backend/ streamlit_app.py --max-line-length=120 --extend-ignore=E203,W503

      - name: black (check only)
        run: black --check --line-length 120 backend/ streamlit_app.py || true

  # ── 2. Unit & Integration Tests ─────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install CPU-only TF to keep CI fast
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov

      - name: Create runtime dirs
        run: |
          mkdir -p frontend/static/{uploads,heatmaps,plots} logs models reports data

      - name: Seed test DB
        env:
          DATABASE_URL: sqlite:///./data/digit_recognition_test.db
          APP_ENV: testing
        run: python -c "
          from backend.database.db import engine, Base
          Base.metadata.create_all(bind=engine)
          print('Test DB created.')
        "

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./data/digit_recognition_test.db
          APP_ENV: testing
          TF_CPP_MIN_LOG_LEVEL: "3"
        run: |
          pytest tests/ -v --tb=short \
            --cov=backend --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            coverage.xml
            tests/

  # ── 3. Security Scan ────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit & safety
        run: pip install bandit safety

      - name: Bandit (SAST)
        run: bandit -r backend/ -ll --quiet || true

      - name: Safety (dependency CVE check)
        run: safety check -r requirements.txt || true
